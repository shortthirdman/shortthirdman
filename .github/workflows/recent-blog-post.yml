name: Latest Medium Blogs
on:
  schedule: # Run workflow automatically
    - cron: '0 0 * * *' # Runs once a day at 00:00 UTC
  workflow_dispatch: # Run workflow manually (without waiting for the cron to be called), through the GitHub Actions Workflow page directly

permissions:
  contents: write # To write the generated contents to the readme
  packages: read
  statuses: write # To report GitHub Actions status checks
  actions: write # Needed for detection of GitHub Actions environment.
  id-token: write # Needed for provenance signing and ID.
  pull-requests: write

jobs:
  update-readme-with-blog:
    name: Update with latest Medium blogs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Pull in Medium posts
        uses: gautamkrishnar/blog-post-workflow@1.9.6
        with:
          feed_names: "Medium"
          feed_list: "https://medium.com/feed/@shortthirdman,https://shortthirdman.medium.com/feed"
