name: Recent GitHub Activity

on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:

permissions:
  contents: write # To write the generated contents to the readme
  packages: read
  statuses: write # To report GitHub Actions status checks
  actions: write # Needed for detection of GitHub Actions environment.
  id-token: write # Needed for provenance signing and ID.
  pull-requests: write

jobs:
  build:
    name: "Update this repository's README with recent activity"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # 1. NEW STEP: Import GPG key and configure Git to sign commits
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
      
      - name: Configure Git
        run: |
          git config user.name "shortthirdman[bot]"
          git config user.email "swetank.mohanty@outlook.com"

      - name: GitHub Activity Readme
        uses: jamesgeorge007/github-activity-readme@v0.5.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          GH_USERNAME: shortthirdman
          MAX_LINES: 10
          FILTER_EVENTS: CommitCommentEvent,CreateEvent,DeleteEvent,DiscussionEvent,ForkEvent,IssueCommentEvent,IssuesEvent,MemberEvent,PublicEvent,PullRequestEvent,PullRequestReviewEvent,PullRequestReviewCommentEvent,PushEvent,ReleaseEvent,WatchEvent
